# Example handoff_packet — copy shape into projects/<id>/scenes/scene_0N/handoff_packet.yaml
# Built AFTER scene_N is accepted; consumed when generating scene_N+1.

from_scene: scene_01
to_scene: scene_02

visual_anchor:
  path: scenes/scene_01/handoff_frame.png
  # sha256 filled by CLI
  sha256: null
  # must equal scenes/scene_02/start_image.png bytes

frame0_contract:
  exact_first_frame: true
  no_relight: true
  no_recompose: true
  no_time_of_day_change: true
  prompt_en: >-
    Use the provided input image as the EXACT first frame.
    Match lighting, exposure, white balance, and brightness on frame 0.
    Do not re-light or recompose. Only begin motion after frame 0.

character_lock_ref: character/character_lock.md
look_lock_ref: character/look_lock.md

observed_end_state:
  scene_end_type: plant-feet   # hold | plant-feet | gesture | walk
  character_position: center-right
  facing_direction: right
  gaze_direction: firefly ahead-right
  body_pose: standing, beginning right step
  left_hand: lantern
  right_hand: free
  expression: curious
  camera: medium-full, slight push-in
  camera_motion: gentle forward, constant speed
  lighting: cool moonlight upper-left, warm lantern fill
  exposure_notes: dim night, no bloom ramp
  background: moonlit grass path
  active_motion: continuing a slow step to the right toward the firefly

motion:
  active_motion_sentence: >-
    Continues the exact same slow step already in progress — same leading foot,
    same direction, same speed, no pause, no restart of the walk cycle.
  leading_foot: right
  speed: slow
  direction: right
  do_not_restart: true
  first_seconds_only_continue: 2.0

camera:
  shot: medium-full
  motion_sentence: >-
    Camera continues the same gentle forward move at constant speed; no whip pan,
    no cut, no reverse direction.

tail_context:
  last_seconds: 0.5
  summary_en: >-
    Lulu on moonlit grass turned to a firefly and started a first step right
    while holding the star lantern.

negative:
  - character redesign
  - face morph
  - outfit change
  - relight
  - auto-exposure
  - HDR boost
  - bloom spike
  - teleport
  - walk cycle restart
  - fade out
  - text

generator:
  id: grok-imagine
  supports_exact_start_frame: partial
