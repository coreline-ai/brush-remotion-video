<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- 펜 커서 스프라이트 (자체 제작).
       CursorLayer가 rotate(rot+180)을 적용하므로 원본은 펜촉(14,14)이 좌상단을 향하게 그린다.
       표시 시에는 펜촉이 그리는 지점에 닿고 펜대가 위쪽으로 뻗는다. -->
  <!-- 펜대 그림자 -->
  <path d="M26 26 L152 152" stroke="rgba(0,0,0,0.18)" stroke-width="16" stroke-linecap="round" transform="translate(3 5)"/>
  <!-- 펜대 -->
  <path d="M26 26 L150 150" stroke="#1c1c1c" stroke-width="14" stroke-linecap="round"/>
  <path d="M28 28 L148 148" stroke="#3a6df0" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
  <!-- 펜 끝 마감(캡) -->
  <circle cx="150" cy="150" r="9" fill="#1c1c1c"/>
  <circle cx="150" cy="150" r="4" fill="#3a6df0" opacity="0.9"/>
  <!-- 펜촉 -->
  <path d="M12 12 L40 22 L22 40 Z" fill="#1c1c1c"/>
  <path d="M12 12 L26 17 L17 26 Z" fill="#4a4a4a"/>
  <!-- 클립 -->
  <path d="M92 72 L134 114" stroke="#9a9a9a" stroke-width="4" stroke-linecap="round"/>
</svg>
