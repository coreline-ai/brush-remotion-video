name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "pipeline[dev]"

      - name: Public tree contract
        run: python scripts/check-public-tree.py

      - name: Voice preview contract
        run: python bin/voice-assets.py validate

      - name: Generated catalogs
        run: |
          python bin/skill-catalog.py check
          python bin/camera-prompt-catalog.py check

      - name: TypeScript regression
        run: |
          npm run check-schema
          npm run typecheck
          npm test

      - name: Python regression
        run: python -m pytest pipeline/tests -q

      - name: Whitespace check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git show --check --format= "$HEAD_SHA"
          fi
